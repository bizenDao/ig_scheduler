<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IG Scheduler — @bizenyakiko</title>
  <link rel="stylesheet" href="style.css?v=1773046751">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <header>
    <div>
      <h1>📸 IG Scheduler</h1>
      <div class="sub">@bizenyakiko</div>
    </div>
    <button class="skill-btn" onclick="openSkills()" title="スキル一覧">📖</button>
</header>

<!-- スキルモーダル -->
<div id="skill-modal" class="modal-overlay" style="display:none" onclick="closeSkills(event)">
  <div class="modal-box">
    <div class="modal-header">
      <span>📖 スキル一覧</span>
      <button onclick="closeSkillModal()">✕</button>
    </div>
    <div id="skill-list"></div>
    <div id="skill-detail" style="display:none">
      <button class="back-btn" onclick="showSkillList()">← 戻る</button>
      <div id="skill-md"></div>
    </div>
  </div>
</div>

  <div class="tabs">
    <button class="tab active" data-stage="proposal">提案<span class="badge" id="badge-proposal">0</span></button>
    <button class="tab" data-stage="draft">下書き<span class="badge" id="badge-draft">0</span></button>
    <button class="tab" data-stage="schedule">予定<span class="badge" id="badge-schedule">0</span></button>
    <button class="tab" data-stage="posted">投稿済み<span class="badge" id="badge-posted">0</span></button>
  </div>
  <div id="next-cron" style="text-align:center;font-size:.75rem;color:#888;padding:6px 0;background:#1a1a2e;border-bottom:1px solid #0f3460"></div>

  <div class="content" id="content"></div>

  <div class="toast" id="toast"></div>

  <script src="app.js?v=1773046751"></script>
</body>
</html>
